name: CI / Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build all packages
        run: npm run build

  docker:
    name: Build & push Docker images
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      matrix:
        service:
          - name: auth
            context: backend/services/auth
          - name: customers
            context: backend/services/customers
          - name: billing
            context: backend/services/billing
          - name: radius
            context: backend/services/radius
          - name: api-gateway
            context: backend/services/api-gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }} image
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ispradius-${{ matrix.service.name }}:latest
            ghcr.io/${{ github.repository_owner }}/ispradius-${{ matrix.service.name }}:${{ github.sha }}
          build-args: |
            NODE_ENV=production

deploy:
  name: Deploy to Kubernetes (optional)
  needs: docker
  runs-on: ubuntu-latest

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: "latest"

    - name: Configure kubeconfig
      if: ${{ secrets.KUBE_CONFIG_DATA != '' }}
      run: |
        echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > kubeconfig
        echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

    - name: Apply Kubernetes manifests
      if: ${{ secrets.KUBE_CONFIG_DATA != '' }}
      run: |
        kubectl apply -f infrastructure/kubernetes/
