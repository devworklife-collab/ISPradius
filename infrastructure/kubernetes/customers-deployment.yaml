apiVersion: apps/v1
kind: Deployment
metadata:
  name: ispradius-customers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ispradius-customers
  template:
    metadata:
      labels:
        app: ispradius-customers
    spec:
      containers:
        - name: customers
          image: ispradius/customers:latest
          ports:
            - containerPort: 4002
          env:
            - name: DATABASE_URL
              value: "postgres://postgres:postgres@postgres:5432/ispradius"
---
apiVersion: v1
kind: Service
metadata:
  name: ispradius-customers
spec:
  selector:
    app: ispradius-customers
  ports:
    - port: 4002
      targetPort: 4002
  type: ClusterIP
