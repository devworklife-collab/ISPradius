apiVersion: apps/v1
kind: Deployment
metadata:
  name: ispradius-billing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ispradius-billing
  template:
    metadata:
      labels:
        app: ispradius-billing
    spec:
      containers:
        - name: billing
          image: ispradius/billing:latest
          ports:
            - containerPort: 4003
          env:
            - name: DATABASE_URL
              value: "postgres://postgres:postgres@postgres:5432/ispradius"
            - name: REDIS_URL
              value: "redis://redis:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: ispradius-billing
spec:
  selector:
    app: ispradius-billing
  ports:
    - port: 4003
      targetPort: 4003
  type: ClusterIP
